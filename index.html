<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ASL Translator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <h2>ASL Translator</h2>

    <video id="video" autoplay></video>

    <div id="output">Show gesture...</div>

    <button onclick="speakSentence()">🔊 Speak Sentence</button>
    <button onclick="clearSentence()">Clear</button>

  </div>

  <!-- Mediapipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script src="script.js"></script>
  <div class="welcome-screen">
    <h1>Welcome to ASL Translator</h1>
    <p>Translate Sign Language into Meaningful Text</p>
    <button class="start-btn">Get Started</button>
</div>

<div class="app-container">

    <!-- CAMERA -->
    <div class="camera-section">
        <video autoplay playsinline></video>
    </div>

    <!-- OUTPUT -->
    <div class="output-section">

        <div class="app-title">
            ASL Translator
        </div>

        <div class="gesture-box">
            <div class="gesture-text">
                Show Gesture...
            </div>
        </div>

        <button class="clear-btn">
            Clear
        </button>

    </div>

</div>
  <script>
const startBtn = document.querySelector(".start-btn");
const welcomeScreen = document.querySelector(".welcome-screen");

startBtn.addEventListener("click", () => {
    welcomeScreen.style.display = "none";
});
</script>

</body>
</html>
